<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tela de Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg-light min-vh-100 d-flex align-items-center">

    <main class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-8 col-md-6 col-lg-4">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h1 class="card-title text-center mb-4 fs-3" id="titulo">Login</h1>
                        <form id="form-login">
                            <div class="mb-3">
                                <label for="email" class="form-label">E-mail</label>
                                <input type="email" class="form-control" id="email" placeholder="Digite seu e-mail"
                                    required>
                            </div>
                            <div class="mb-3">
                                <label for="senha" class="form-label">Senha</label>
                                <input type="password" class="form-control" id="senha" placeholder="Digite sua senha"
                                    required>
                            </div>
                            <div class="d-grid mb-3">
                                <button type="submit" class="btn btn-primary" id="botao-envio">Entrar</button>
                            </div>
                        </form>
                        <div id="mensagem"></div>
                        <div class="text-center">
                            <a href="#" class="text-decoration-none d-block mb-2">Esqueceu sua senha?</a>
                            <a href="#" class="text-decoration-none" id="toggle">Não tem conta? Cadastre-se!</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="scripts/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09Jc3n37P9G3U3qP5b75U4q3qf1Y3r6qP5b75U4q3qf1Y"
        crossorigin="anonymous"></script>
</body>

</html>
